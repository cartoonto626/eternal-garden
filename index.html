<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-browser-capable" content="yes">
    <meta name="apple-mobile-web-browser-status-bar-style" content="black-translucent">
    <title>Eternal Garden: Genesis</title>
    <style>
        :root { --accent: #00ffcc; }
        body { margin: 0; background: #000; color: #fff; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; touch-action: none; }
        canvas { display: block; filter: contrast(1.1) brightness(1.2); }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #overlay.hidden { opacity: 0; visibility: hidden; }
        
        .logo-circle { width: 80px; height: 80px; border: 1px solid var(--accent); border-radius: 50%; margin-bottom: 20px; animation: pulse 4s infinite; }
        h0 { font-size: 20px; font-weight: 100; letter-spacing: 8px; color: var(--accent); text-transform: uppercase; }

        #ui { position: absolute; top: 50px; left: 0; width: 100%; text-align: center; pointer-events: none; z-index: 100; opacity: 0; transition: opacity 1s; }
        #ui.visible { opacity: 1; }
        
        .header {
            display: inline-block; background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 10px 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        #meta { font-size: 8px; letter-spacing: 2px; color: var(--accent); margin-bottom: 4px; }
        #title { margin: 0 0 8px 0; font-size: 18px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; }
        #exp-line { width: 100%; height: 2px; background: rgba(255,255,255,0.1); }
        #exp-fill { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 10px var(--accent); transition: width 0.3s; }

        #rebirth-btn { 
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #000; border: none; padding: 12px 30px; border-radius: 25px;
            font-size: 11px; font-weight: bold; letter-spacing: 2px; display: none; z-index: 200;
        }

        .tap-val { position: fixed; color: var(--accent); font-weight: 900; pointer-events: none; animation: floatUp 0.6s ease-out forwards; font-size: 20px; z-index: 500; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-60px); opacity: 0; } }
        @keyframes pulse { 0%, 100% { transform: scale(0.9); opacity: 0.3; } 50% { transform: scale(1.1); opacity: 0.7; } }
    </style>
</head>
<body>

<div id="overlay" onclick="startGame()">
    <div class="logo-circle"></div>
    <h0>Eternal Garden</h0>
</div>

<div id="ui">
    <div class="header">
        <div id="meta">GEN 1 / STAGE 1</div>
        <h1 id="title">SEED</h1>
        <div id="exp-line"><div id="exp-fill"></div></div>
    </div>
</div>

<button id="rebirth-btn" onclick="triggerRebirth()">SUBLIMATE</button>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    const expFill = document.getElementById('exp-fill'), metaText = document.getElementById('meta'), titleText = document.getElementById('title');
    const rebirthBtn = document.getElementById('rebirth-btn'), overlay = document.getElementById('overlay'), ui = document.getElementById('ui');

    let w, h, time = 0, exp = 0, level = 1, rebirth = 0, gameStarted = false;
    let stars = [], particles = [], dna = {};

    const evolutionNames = ["Seed", "Sprout", "Sapling", "Bonsai", "Radiant", "Bloom", "Ancient", "Galaxy", "Void", "Eternal"];
    const typeColors = ['#00ffcc', '#ff00ff', '#00ff88', '#ffff00', '#ffffff', '#ff4d4d', '#4d79ff'];

    function generateDNA() {
        dna = {
            angle: 10 + Math.random() * 60,   // 枝の開き（狭い〜広い）
            shrink: 0.65 + Math.random() * 0.15, // 次の枝の長さ
            sway: 1 + Math.random() * 5,    // 揺れ幅
            type: Math.floor(Math.random() * 5), // 0:線, 1:丸, 2:三角, 3:四角, 4:六角
            baseAngle: (Math.random() - 0.5) * 40, // 全体の傾き
            shapeSize: 0.5 + Math.random() * 1.5, // 図形の大きさ倍率
            dir: (Math.random() > 0.5 ? 1 : -1) // 成長の「癖」
        };
    }

    function init() {
        w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
        stars = Array.from({length: 50}, () => ({ x: Math.random()*w, y: Math.random()*h, s: Math.random()*1 }));
        generateDNA();
    }

    function startGame() { gameStarted = true; overlay.classList.add('hidden'); ui.classList.add('visible'); }

    window.addEventListener('touchstart', e => {
        if(!gameStarted || level >= 20) return;
        e.preventDefault();
        const gain = (10 / Math.log2(level + 2)) * (1 + rebirth * 1.5);
        exp += gain;
        if(exp >= 100 && level < 20) { level++; exp = 0; updateUI(); }
        expFill.style.width = exp + '%';
        const t = e.touches[0];
        showTapValue(t.clientX, t.clientY, gain);
        for(let i=0; i<5; i++) particles.push({x: t.clientX, y: t.clientY, a: Math.random()*Math.PI*2, s: Math.random()*3+1, l: 1});
    });

    function showTapValue(x, y, val) {
        const el = document.createElement('div');
        el.className = 'tap-val'; el.style.left = x + 'px'; el.style.top = y + 'px';
        el.innerText = '+' + val.toFixed(0);
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 600);
    }

    function updateUI() {
        metaText.innerText = `GEN ${rebirth + 1} / STAGE ${level} (BUFF x${(1 + rebirth * 1.5).toFixed(1)})`;
        titleText.innerText = evolutionNames[Math.min(9, Math.floor((level-1)/2))];
        document.documentElement.style.setProperty('--accent', typeColors[rebirth % typeColors.length]);
        if(level >= 20) rebirthBtn.style.display = 'block';
    }

    function triggerRebirth() {
        rebirth++; level = 1; exp = 0; generateDNA();
        rebirthBtn.style.display = 'none'; updateUI();
    }

    function drawShape(ctx, len) {
        const s = len * 0.3 * dna.shapeSize;
        if (dna.type === 1) ctx.arc(0, -len/2, len/2, 0, Math.PI*2);
        else if (dna.type === 2) { ctx.moveTo(0, -len); ctx.lineTo(s, 0); ctx.lineTo(-s, 0); ctx.closePath(); }
        else if (dna.type === 3) ctx.rect(-s/2, -len, s, s);
        else if (dna.type === 4) {
            for(let i=0; i<6; i++) ctx.lineTo(s * Math.cos(i*Math.PI/3), -len + s * Math.sin(i*Math.PI/3));
            ctx.closePath();
        } else { ctx.moveTo(0, 0); ctx.lineTo(0, -len); }
    }

    function drawTree(x, y, len, angle, depth) {
        if (depth > Math.min(level + 1, 10)) return;
        
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle * Math.PI / 180);
        
        ctx.beginPath();
        ctx.strokeStyle = (depth > level - 2) ? getComputedStyle(document.documentElement).getPropertyValue('--accent') : "#fff";
        ctx.lineWidth = Math.max(1, 10 / (depth + 1));
        ctx.globalAlpha = 1 - (depth / 12);
        
        drawShape(ctx, len);
        ctx.stroke();

        const swayAmt = Math.sin(time + depth) * dna.sway;
        drawTree(0, -len, len * dna.shrink, dna.angle + swayAmt, depth + 1);
        drawTree(0, -len, len * dna.shrink, -dna.angle + swayAmt, depth + 1);
        ctx.restore();
    }

    function render() {
        time = Date.now() * 0.0015;
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, w, h);
        
        stars.forEach(s => {
            ctx.fillStyle = "#fff"; ctx.globalAlpha = 0.2;
            ctx.fillRect(s.x, s.y, s.s, s.s);
        });

        if(gameStarted) {
            particles.forEach((p, i) => {
                p.x += Math.cos(p.a)*p.s; p.y += Math.sin(p.a)*p.s; p.l -= 0.03;
                if(p.l <= 0) particles.splice(i, 1);
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent');
                ctx.globalAlpha = p.l; ctx.fillRect(p.x, p.y, 2, 2);
            });

            // はみ出し防止のスケーリング計算
            const baseLen = (h / 6) + (level * 5);
            const scale = Math.min(1, (h * 0.8) / (baseLen * 3)); // 画面の80%に収める
            
            ctx.lineCap = 'round';
            drawTree(w/2, h - 100, baseLen * scale, dna.baseAngle, 0);
        }
        requestAnimationFrame(render);
    }
    window.addEventListener('resize', init);
    init(); render(); updateUI();
</script>
</body>
</html>
