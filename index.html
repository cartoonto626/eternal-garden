<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Eternal Garden</title>

    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <style>
        :root { --neon-color: #00ff7f; }
        body { margin: 0; background: #000; color: var(--neon-color); font-family: 'Georgia', serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }

        /* UI要素 */
        .ui-panel { position: absolute; z-index: 5; display: flex; flex-direction: column; gap: 15px; }
        .left-panel { top: 20px; left: 20px; }
        .right-panel { top: 20px; right: 20px; }
        
        button {
            background: rgba(0,0,0,0.6); border: 1px solid var(--neon-color); color: var(--neon-color);
            padding: 12px; cursor: pointer; border-radius: 50%; width: 50px; height: 50px;
            font-size: 1.2rem; transition: 0.3s; pointer-events: auto;
        }
        button:active { background: var(--neon-color); color: #000; }

        /* スタート画面 */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 1.5s;
        }
        #start-screen.fade-out { opacity: 0; pointer-events: none; }
        h1 { font-size: 2rem; letter-spacing: 0.5em; text-shadow: 0 0 20px var(--neon-color); }
        .description { font-size: 0.8rem; opacity: 0.6; margin-bottom: 40px; }
        .enter-btn { 
            background: none; border: 1px solid var(--neon-color); width: auto; height: auto; 
            border-radius: 0; padding: 15px 40px; font-size: 1rem;
        }

        /* 標本箱（アーカイブ） */
        #archive-panel {
            position: fixed; left: -300px; top: 0; width: 250px; height: 100%;
            background: rgba(0, 15, 10, 0.9); border-right: 1px solid var(--neon-color);
            transition: 0.5s; z-index: 10; padding: 20px; overflow-y: auto;
        }
        #archive-panel.open { left: 0; }
        .archive-item { margin-bottom: 10px; padding: 10px; border-bottom: 1px solid rgba(0,255,127,0.3); cursor: pointer; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>ETERNAL GARDEN</h1>
        <p class="description">TAP TO NURTURE THE DIGITAL SEED</p>
        <button class="enter-btn" onclick="startGame()">ENTER</button>
    </div>

    <div id="archive-panel">
        <h3>ARCHIVE</h3>
        <div id="archive-list"></div>
    </div>

    <div class="ui-panel left-panel">
        <button onclick="toggleArchive()">≡</button>
    </div>

    <div class="ui-panel right-panel">
        <button onclick="saveSpecimen()">＋</button>
        <button onclick="resetGarden()">↺</button>
    </div>

    <canvas id="gardenCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gardenCanvas');
        const ctx = canvas.getContext('2d');
        let specimens = JSON.parse(localStorage.getItem('garden_archive') || '[]');
        let level = 1;
        let branches = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawGarden();
        }
        window.addEventListener('resize', resize);
        resize();

        function startGame() {
            document.getElementById('start-screen').classList.add('fade-out');
            // 音声再生のトリガーなどをここに入れる
        }

        function toggleArchive() {
            document.getElementById('archive-panel').classList.toggle('open');
            updateArchiveList();
        }

        // --- 核心：樹の描画ロジック（今までの機能をここに完全再現） ---
        function drawTree(x, y, len, angle, branchWidth) {
            ctx.beginPath();
            ctx.save();
            ctx.strokeStyle = var(--neon-color);
            ctx.lineWidth = branchWidth;
            ctx.translate(x, y);
            ctx.rotate(angle * Math.PI / 180);
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -len);
            ctx.stroke();

            if (len < 10) {
                ctx.restore();
                return;
            }

            drawTree(0, -len, len * 0.75, angle + 20, branchWidth * 0.8);
            drawTree(0, -len, len * 0.75, angle - 20, branchWidth * 0.8);
            ctx.restore();
        }

        function drawGarden() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawTree(canvas.width / 2, canvas.height * 0.8, level * 10, 0, 2);
        }

        // タップで成長
        canvas.addEventListener('touchstart', (e) => {
            level++;
            drawGarden();
        });

        function saveSpecimen() {
            const name = prompt("標本に名を刻む / Name this specimen", `Specimen ${specimens.length + 1}`);
            if (name) {
                specimens.push({ name, level: level });
                localStorage.setItem('garden_archive', JSON.stringify(specimens));
                alert("標本箱に保存しました");
            }
        }

        function updateArchiveList() {
            const list = document.getElementById('archive-list');
            list.innerHTML = '';
            specimens.forEach((s, i) => {
                const div = document.createElement('div');
                div.className = 'archive-item';
                div.innerText = `${s.name} (Lv.${s.level})`;
                div.onclick = () => { level = s.level; drawGarden(); toggleArchive(); };
                list.appendChild(div);
            });
        }

        function resetGarden() { level = 1; drawGarden(); }

        drawGarden();
    </script>
</body>
</html>
