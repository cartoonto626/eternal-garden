<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Eternal Garden: Infinity</title>
    <style>
        :root { --accent: #00ffcc; }
        body { margin: 0; background: #000; color: #fff; overflow: hidden; font-family: 'Helvetica Neue', sans-serif; touch-action: none; }
        canvas { display: block; filter: contrast(1.1) brightness(1.2); }

        /* スタート画面 */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 3000; transition: opacity 1.5s ease;
        }
        #overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .logo-circle { width: 50px; height: 50px; border: 1px solid var(--accent); border-radius: 50%; animation: pulse 4s infinite; }

        /* スリム・ステータスバー */
        .status-bar {
            position: absolute; top: 55px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 6px 18px; border-radius: 20px; border: 0.5px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 12px; min-width: 240px; z-index: 100; opacity: 0; transition: 1s;
        }
        .status-main { display: flex; flex-direction: column; }
        #meta-info { font-size: 7px; letter-spacing: 1px; color: var(--accent); opacity: 0.8; }
        #title { font-size: 12px; letter-spacing: 4px; font-weight: 800; text-transform: uppercase; }
        .exp-container { flex-grow: 1; height: 1px; background: rgba(255,255,255,0.1); position: relative; }
        #exp-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--accent); box-shadow: 0 0 8px var(--accent); transition: width 0.3s; }

        /* サイドボタン（最小化） */
        .side-controls { position: absolute; top: 55%; right: 15px; transform: translateY(-50%); display: flex; flex-direction: column; gap: 18px; z-index: 100; opacity: 0; transition: 1s; }
        .icon-btn { 
            width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.05); 
            backdrop-filter: blur(10px); border: 0.5px solid rgba(255,255,255,0.1); color: #fff; font-size: 16px; 
            display: flex; align-items: center; justify-content: center;
        }
        #add-btn { background: var(--accent); color: #000; border: none; font-size: 20px; }

        /* ギャラリー */
        #gallery-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            z-index: 2000; display: none; flex-direction: column; align-items: center; padding: 100px 20px;
        }
        #gallery-page.open { display: flex; }
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; overflow-y: auto; }
        .gallery-item { aspect-ratio: 1; border-radius: 10px; border: 0.5px solid rgba(255,255,255,0.1); background-size: cover; background-position: center; }

        #rebirth-btn { 
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #000; border: none; padding: 12px 35px; border-radius: 25px;
            font-size: 10px; font-weight: 900; letter-spacing: 3px; display: none; z-index: 100;
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.2; } 50% { transform: scale(1.15); opacity: 0.5; } }
    </style>
</head>
<body>

<div id="overlay" onclick="startGame()">
    <div class="logo-circle"></div>
    <div style="font-size:10px; letter-spacing:10px; margin-top:20px; font-weight:200; opacity:0.6;">ETERNAL GARDEN</div>
</div>

<div id="status-ui" class="status-bar">
    <div class="status-main">
        <div id="meta-info">G.1 / S.1 (x1.0)</div>
        <div id="title">SEED</div>
    </div>
    <div class="exp-container"><div id="exp-fill"></div></div>
</div>

<div id="side-ui" class="side-controls">
    <button id="add-btn" class="icon-btn" onclick="addToCollection()">+</button>
    <button class="icon-btn" onclick="toggleGallery()">𖡼</button>
    <button class="icon-btn" onclick="shareCanvas()">↑</button>
    <button class="icon-btn" onclick="location.reload()">↺</button>
</div>

<button id="rebirth-btn" onclick="triggerRebirth()">SUBLIMATE</button>

<div id="gallery-page">
    <div style="font-size:9px; letter-spacing:10px; margin-bottom:30px; opacity:0.5;">ARCHIVE</div>
    <div class="gallery-grid" id="gallery-grid"></div>
    <button style="margin-top:40px; background:none; border:0.5px solid #fff; color:#fff; padding:10px 30px; border-radius:20px; font-size:10px;" onclick="toggleGallery()">BACK</button>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    const expFill = document.getElementById('exp-fill'), titleText = document.getElementById('title'), metaInfo = document.getElementById('meta-info');
    const rebirthBtn = document.getElementById('rebirth-btn'), overlay = document.getElementById('overlay');
    const statusUi = document.getElementById('status-ui'), sideUi = document.getElementById('side-ui');
    const galleryPage = document.getElementById('gallery-page'), galleryGrid = document.getElementById('gallery-grid');

    let w, h, time = 0, exp = 0, level = 1, rebirth = 0, dna = {}, gameStarted = false;
    const evolutionNames = ["Seed", "Sprout", "Sapling", "Bonsai", "Radiant", "Bloom", "Ancient", "Galaxy", "Void", "Eternal"];
    const typeColors = ['#00ffcc', '#ff00ff', '#00ff88', '#ffff00', '#ff4d4d', '#4d79ff', '#ffffff'];

    function generateUniqueDNA() {
        const seed = Date.now() + Math.random();
        dna = {
            angle: 15 + (Math.sin(seed) * 0.5 + 0.5) * 55,
            shrink: 0.68 + (Math.cos(seed) * 0.5 + 0.5) * 0.12,
            sway: 1.5 + Math.random() * 4,
            type: Math.floor(Math.random() * 5),
            color: typeColors[Math.floor(Math.random() * typeColors.length)],
            leafColor: Math.random() > 0.4 ? '#fff' : '#00ffcc',
            thickness: 4 + Math.random() * 4,
            tilt: (Math.random() - 0.5) * 12
        };
        document.documentElement.style.setProperty('--accent', dna.color);
    }

    function init() {
        w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
        generateUniqueDNA();
    }

    function startGame() { 
        gameStarted = true; overlay.classList.add('hidden'); 
        statusUi.style.opacity = "1"; sideUi.style.opacity = "1";
    }

    window.addEventListener('touchstart', e => {
        if(!gameStarted || galleryPage.style.display === 'flex' || e.target.closest('button')) return;
        if(level < 20) {
            exp += (22 / Math.log2(level + 2)) * (1 + rebirth * 0.5);
            if(exp >= 100) { level++; exp = 0; updateUI(); }
            expFill.style.width = Math.min(100, exp) + '%';
        }
    });

    function updateUI() {
        const power = (1 + rebirth * 0.5).toFixed(1);
        metaInfo.innerText = `G.${rebirth + 1} / S.${level} (x${power})`;
        titleText.innerText = evolutionNames[Math.min(9, Math.floor((level-1)/2))];
        rebirthBtn.style.display = level >= 20 ? 'block' : 'none';
    }

    function triggerRebirth() { rebirth++; level = 1; exp = 0; generateUniqueDNA(); updateUI(); }
    function toggleGallery() { galleryPage.style.display = galleryPage.style.display === 'flex' ? 'none' : 'flex'; }

    function addToCollection() {
        const item = document.createElement('div');
        item.className = 'gallery-item';
        item.style.backgroundImage = `url(${canvas.toDataURL('image/png', 0.2)})`;
        const currentDNA = JSON.parse(JSON.stringify(dna));
        item.onclick = () => { dna = currentDNA; document.documentElement.style.setProperty('--accent', dna.color); toggleGallery(); };
        galleryGrid.insertBefore(item, galleryGrid.firstChild);
    }

    function shareCanvas() {
        const link = document.createElement('a');
        link.download = `Garden_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png'); link.click();
    }

    function drawShape(len) {
        const s = len * 0.3;
        if (dna.type === 1) ctx.arc(0, -len/2, len/2, 0, Math.PI*2);
        else if (dna.type === 2) { ctx.moveTo(0, -len); ctx.lineTo(s, 0); ctx.lineTo(-s, 0); ctx.closePath(); }
        else if (dna.type === 3) ctx.rect(-s/2, -len, s, s);
        else if (dna.type === 4) {
            for(let i=0; i<6; i++) ctx.lineTo(s * Math.cos(i*Math.PI/3), -len + s * Math.sin(i*Math.PI/3));
            ctx.closePath();
        } else { ctx.moveTo(0, 0); ctx.lineTo(0, -len); }
    }

    function drawTree(x, y, len, angle, depth) {
        if (depth > Math.min(level + 1, 11)) return;
        ctx.save();
        ctx.translate(x, y); ctx.rotate(angle * Math.PI / 180);
        ctx.beginPath();
        ctx.strokeStyle = (depth > level - 2) ? dna.leafColor : dna.color;
        ctx.lineWidth = Math.max(0.6, dna.thickness / (depth + 1));
        ctx.globalAlpha = 1 - (depth / 15);
        drawShape(len); ctx.stroke();
        const s = Math.sin(time + depth) * dna.sway;
        drawTree(0, -len, len * dna.shrink, dna.angle + s, depth + 1);
        drawTree(0, -len, len * dna.shrink, -dna.angle + s, depth + 1);
        ctx.restore();
    }

    function render() {
        time = Date.now() * 0.002;
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, w, h);
        if(gameStarted) {
            // SEEDのサイズを小さく(h/12)、成長幅を調整
            const baseLen = (h / 12) + (level * 5);
            // どんなに巨大化しても画面の80%に収まるように自動縮小
            const autoScale = Math.min(1, (h * 0.8) / (baseLen * 3.5));
            drawTree(w/2, h - 60, baseLen * autoScale, dna.tilt, 0);
        }
        requestAnimationFrame(render);
    }
    window.addEventListener('resize', init);
    init(); render(); updateUI();
</script>
</body>
</html>
