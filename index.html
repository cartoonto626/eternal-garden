<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-browser-capable" content="yes">
    <meta name="apple-mobile-web-browser-status-bar-style" content="black-translucent">
    <title>Eternal Garden: Elite Edition</title>
    <style>
        :root { --accent: #00ffcc; }
        body { margin: 0; background: #000; color: #fff; overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; touch-action: none; }
        canvas { display: block; filter: contrast(1.1) brightness(1.2) saturate(1.3); }

        /* スタート画面 */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 3000; transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .logo-circle { width: 60px; height: 60px; border: 1px solid var(--accent); border-radius: 50%; animation: pulse 4s infinite; }

        /* メインUI */
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; opacity: 0; transition: opacity 1s; }
        #ui.visible { opacity: 1; }
        .interactive { pointer-events: auto; }

        /* スタイリッシュな1列ステータスバー */
        .status-bar {
            position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 8px 20px; border-radius: 30px; border: 0.5px solid rgba(255,255,255,0.15);
            display: flex; align-items: center; gap: 15px; min-width: 280px; white-space: nowrap;
        }
        .status-main { display: flex; flex-direction: column; align-items: flex-start; }
        #meta-info { font-size: 8px; letter-spacing: 1px; color: var(--accent); opacity: 0.9; margin-bottom: 2px; }
        #title { font-size: 14px; letter-spacing: 3px; font-weight: 800; text-transform: uppercase; }
        .exp-container { flex-grow: 1; height: 2px; background: rgba(255,255,255,0.1); border-radius: 1px; position: relative; min-width: 80px; }
        #exp-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--accent); box-shadow: 0 0 10px var(--accent); transition: width 0.3s; }

        /* サイド・コントロール（誤操作防止のため右側に配置） */
        .side-controls { position: absolute; top: 50%; right: 20px; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; }
        .icon-btn { 
            width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,0.08); 
            backdrop-filter: blur(15px); border: 0.5px solid rgba(255,255,255,0.1); color: #fff; font-size: 18px; 
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .icon-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }
        #add-btn { background: var(--accent); color: #000; border: none; font-weight: bold; }

        /* ギャラリー */
        #gallery-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            z-index: 2000; display: none; flex-direction: column; align-items: center; padding: 100px 20px 40px;
        }
        #gallery-page.open { display: flex; }
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; overflow-y: auto; padding-bottom: 40px; }
        .gallery-item { aspect-ratio: 1; border-radius: 12px; border: 0.5px solid rgba(255,255,255,0.2); background-size: cover; background-position: center; }
        .close-gallery { margin-top: auto; padding: 12px 40px; border-radius: 25px; border: 0.5px solid #fff; background: none; color: #fff; font-size: 11px; letter-spacing: 3px; }

        #rebirth-btn { 
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #000; border: none; padding: 14px 40px; border-radius: 30px;
            font-size: 11px; font-weight: 900; letter-spacing: 3px; display: none; box-shadow: 0 0 30px var(--accent);
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.1); opacity: 0.7; } }
    </style>
</head>
<body>

<div id="overlay" onclick="startGame()">
    <div class="logo-circle"></div>
    <div style="font-size:12px; letter-spacing:8px; margin-top:20px; font-weight:200;">ETERNAL GARDEN</div>
</div>

<div id="ui">
    <div class="status-bar">
        <div class="status-main">
            <div id="meta-info">G.1 / S.1 (x1.0)</div>
            <div id="title">SEED</div>
        </div>
        <div class="exp-container"><div id="exp-fill"></div></div>
    </div>

    <div class="side-controls">
        <button id="add-btn" class="icon-btn interactive" onclick="addToCollection()">+</button>
        <button class="icon-btn interactive" onclick="toggleGallery()">𖡼</button>
        <button class="icon-btn interactive" onclick="shareCanvas()">↑</button>
        <button class="icon-btn interactive" onclick="location.reload()">↺</button>
    </div>

    <button id="rebirth-btn" class="interactive" onclick="triggerRebirth()">SUBLIMATE</button>
</div>

<div id="gallery-page" class="interactive">
    <div style="font-size:10px; letter-spacing:10px; margin-bottom:30px; opacity:0.6;">COLLECTION</div>
    <div class="gallery-grid" id="gallery-grid"></div>
    <button class="close-gallery" onclick="toggleGallery()">RETURN</button>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    const expFill = document.getElementById('exp-fill'), titleText = document.getElementById('title'), metaInfo = document.getElementById('meta-info');
    const rebirthBtn = document.getElementById('rebirth-btn'), overlay = document.getElementById('overlay'), ui = document.getElementById('ui');
    const galleryPage = document.getElementById('gallery-page'), galleryGrid = document.getElementById('gallery-grid');

    let w, h, time = 0, exp = 0, level = 1, rebirth = 0, dna = {}, gameStarted = false;
    const evolutionNames = ["Seed", "Sprout", "Sapling", "Bonsai", "Radiant", "Bloom", "Ancient", "Galaxy", "Void", "Eternal"];
    const typeColors = ['#00ffcc', '#ff00ff', '#00ff88', '#ffff00', '#ff4d4d', '#4d79ff', '#ffffff'];

    function generateUniqueDNA() {
        const seed = Date.now() + Math.random();
        const colorBase = typeColors[Math.floor(Math.random() * typeColors.length)];
        dna = {
            angle: 15 + (Math.sin(seed) * 0.5 + 0.5) * 55,
            shrink: 0.68 + (Math.cos(seed) * 0.5 + 0.5) * 0.12,
            sway: 1.5 + Math.random() * 4,
            type: Math.floor(Math.random() * 5),
            color: colorBase,
            leafColor: Math.random() > 0.4 ? '#fff' : colorBase,
            thickness: 5 + Math.random() * 5,
            tilt: (Math.random() - 0.5) * 15
        };
        document.documentElement.style.setProperty('--accent', dna.color);
    }

    function init() {
        w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
        generateUniqueDNA();
    }

    function startGame() { gameStarted = true; overlay.classList.add('hidden'); ui.classList.add('visible'); }

    window.addEventListener('touchstart', e => {
        if(!gameStarted || galleryPage.classList.contains('open')) return;
        if(level < 20) {
            exp += (20 / Math.log2(level + 2)) * (1 + rebirth * 0.5);
            if(exp >= 100) { level++; exp = 0; updateUI(); }
            expFill.style.width = Math.min(100, exp) + '%';
        }
    });

    function updateUI() {
        const power = (1 + rebirth * 0.5).toFixed(1);
        metaInfo.innerText = `G.${rebirth + 1} / S.${level} (x${power})`;
        titleText.innerText = evolutionNames[Math.min(9, Math.floor((level-1)/2))];
        if(level >= 20) rebirthBtn.style.display = 'block';
    }

    function triggerRebirth() {
        rebirth++; level = 1; exp = 0;
        rebirthBtn.style.display = 'none';
        generateUniqueDNA(); updateUI();
    }

    function toggleGallery() { galleryPage.classList.toggle('open'); }

    function addToCollection() {
        const dataUrl = canvas.toDataURL('image/png', 0.2);
        const item = document.createElement('div');
        item.className = 'gallery-item';
        item.style.backgroundImage = `url(${dataUrl})`;
        const currentDNA = JSON.parse(JSON.stringify(dna));
        item.onclick = () => { 
            dna = currentDNA; 
            document.documentElement.style.setProperty('--accent', dna.color);
            toggleGallery();
        };
        galleryGrid.insertBefore(item, galleryGrid.firstChild);
    }

    function shareCanvas() {
        const dataUrl = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.download = `Garden_${Date.now()}.png`;
        link.href = dataUrl; link.click();
    }

    function drawShape(len) {
        const s = len * 0.3;
        if (dna.type === 1) ctx.arc(0, -len/2, len/2, 0, Math.PI*2);
        else if (dna.type === 2) { ctx.moveTo(0, -len); ctx.lineTo(s, 0); ctx.lineTo(-s, 0); ctx.closePath(); }
        else if (dna.type === 3) ctx.rect(-s/2, -len, s, s);
        else if (dna.type === 4) {
            for(let i=0; i<6; i++) ctx.lineTo(s * Math.cos(i*Math.PI/3), -len + s * Math.sin(i*Math.PI/3));
            ctx.closePath();
        } else { ctx.moveTo(0, 0); ctx.lineTo(0, -len); }
    }

    function drawTree(x, y, len, angle, depth) {
        if (depth > Math.min(level + 1, 11)) return;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle * Math.PI / 180);
        ctx.beginPath();
        ctx.strokeStyle = (depth > level - 2) ? dna.leafColor : dna.color;
        ctx.lineWidth = Math.max(0.8, dna.thickness / (depth + 1));
        ctx.globalAlpha = 1 - (depth / 15);
        drawShape(len);
        ctx.stroke();
        const s = Math.sin(time + depth) * dna.sway;
        drawTree(0, -len, len * dna.shrink, dna.angle + s, depth + 1);
        drawTree(0, -len, len * dna.shrink, -dna.angle + s, depth + 1);
        ctx.restore();
    }

    function render() {
        time = Date.now() * 0.002;
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, w, h);
        if(gameStarted) {
            // SEEDからの無垢な始まり（より小さく）
            const baseLen = (h / 8) + (level * 6);
            // はみ出し防止のスケーリング計算
            const scale = Math.min(1, (h * 0.9) / (baseLen * 3)); // 画面の90%に収める
            
            ctx.lineCap = 'round';
            // 樹を下部に配置。UIと被らないように！
            drawTree(w/2, h - 80, baseLen * scale, dna.tilt, 0);
        }
        requestAnimationFrame(render);
    }
    window.addEventListener('resize', init);
    init(); render(); updateUI();
</script>
</body>
</html>
