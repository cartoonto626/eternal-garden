<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Eternal Garden: Archive</title>
    <style>
        :root { --accent: #00ffcc; }
        body { margin: 0; background: #000; color: #fff; overflow: hidden; font-family: -apple-system, sans-serif; touch-action: none; }
        canvas { display: block; filter: contrast(1.1) brightness(1.2) saturate(1.2); }

        /* UIレイヤー */
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .interactive { pointer-events: auto; }

        /* メインヘッダー */
        .header {
            position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px);
            padding: 12px 20px; border-radius: 15px; border: 0.5px solid rgba(255,255,255,0.1);
            text-align: center; min-width: 200px;
        }
        #title { margin: 0; font-size: 16px; letter-spacing: 3px; text-transform: uppercase; font-weight: 800; }
        #exp-bar { width: 100%; height: 2px; background: rgba(255,255,255,0.1); margin-top: 8px; overflow: hidden; }
        #exp-fill { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 10px var(--accent); transition: width 0.3s; }

        /* 右上：シェア・メニュー */
        .top-right { position: absolute; top: 50px; right: 20px; display: flex; flex-direction: column; gap: 15px; }
        .icon-btn { 
            width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(10px); border: none; color: #fff; font-size: 18px; 
            display: flex; align-items: center; justify-content: center;
        }

        /* 下部：コレクション */
        #collection-shelf {
            position: absolute; bottom: 30px; left: 20px; right: 20px;
            display: flex; gap: 10px; overflow-x: auto; padding: 10px 0;
            mask-image: linear-gradient(to right, black 80%, transparent);
        }
        .collection-item {
            min-width: 50px; height: 50px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
            background-size: cover; flex-shrink: 0;
        }
        #add-collection { min-width: 50px; height: 50px; border-radius: 10px; background: var(--accent); color: #000; font-size: 24px; font-weight: bold; border: none; }

        #rebirth-btn { 
            position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #000; border: none; padding: 10px 25px; border-radius: 20px;
            font-size: 10px; font-weight: 900; letter-spacing: 2px; display: none;
        }

        /* アニメーション */
        @keyframes tapEffect { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui">
    <div class="header">
        <div id="title">SEED</div>
        <div id="exp-bar"><div id="exp-fill"></div></div>
    </div>

    <div class="top-right">
        <button class="icon-btn interactive" onclick="shareCanvas()">↑</button>
        <button class="icon-btn interactive" onclick="location.reload()">↺</button>
    </div>

    <button id="rebirth-btn" class="interactive" onclick="triggerRebirth()">SUBLIMATE</button>

    <div id="collection-shelf" class="interactive">
        <button id="add-collection" onclick="addToCollection()">+</button>
        </div>
</div>

<script>
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    const expFill = document.getElementById('exp-fill'), titleText = document.getElementById('title');
    const rebirthBtn = document.getElementById('rebirth-btn'), shelf = document.getElementById('collection-shelf');

    let w, h, time = 0, exp = 0, level = 1, rebirth = 0, dna = {}, collection = [];
    const evolutionNames = ["Seed", "Sprout", "Sapling", "Bonsai", "Radiant", "Bloom", "Ancient", "Galaxy", "Void", "Eternal"];
    const typeColors = ['#00ffcc', '#ff00ff', '#00ff88', '#ffff00', '#ff4d4d', '#4d79ff', '#ffffff'];

    function generateUniqueDNA() {
        const seed = Date.now() + Math.random(); // 究極のランダム性
        const colorBase = typeColors[Math.floor(Math.random() * typeColors.length)];
        dna = {
            angle: 15 + (Math.sin(seed) * 0.5 + 0.5) * 50,
            shrink: 0.68 + (Math.cos(seed) * 0.5 + 0.5) * 0.12,
            sway: 1 + Math.random() * 4,
            type: Math.floor(Math.random() * 5),
            color: colorBase,
            leafColor: Math.random() > 0.5 ? '#fff' : colorBase,
            thickness: 2 + Math.random() * 8,
            tilt: (Math.random() - 0.5) * 30
        };
        document.documentElement.style.setProperty('--accent', dna.color);
    }

    function init() {
        w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
        generateUniqueDNA();
    }

    window.addEventListener('touchstart', e => {
        e.preventDefault();
        if(level < 20) {
            exp += (12 / Math.log2(level + 2)) * (1 + rebirth * 0.5);
            if(exp >= 100) { level++; exp = 0; updateUI(); }
            expFill.style.width = exp + '%';
        }
    });

    function updateUI() {
        titleText.innerText = evolutionNames[Math.min(9, Math.floor((level-1)/2))];
        if(level >= 20) rebirthBtn.style.display = 'block';
    }

    function triggerRebirth() {
        rebirth++; level = 1; exp = 0;
        rebirthBtn.style.display = 'none';
        generateUniqueDNA();
        updateUI();
    }

    function addToCollection() {
        const dataUrl = canvas.toDataURL('image/png', 0.1);
        const item = document.createElement('div');
        item.className = 'collection-item';
        item.style.backgroundImage = `url(${dataUrl})`;
        const currentDNA = JSON.parse(JSON.stringify(dna)); // DNAを保存
        item.onclick = () => { dna = currentDNA; document.documentElement.style.setProperty('--accent', dna.color); };
        shelf.appendChild(item);
    }

    function shareCanvas() {
        const dataUrl = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.download = `Garden_${Date.now()}.png`;
        link.href = dataUrl;
        link.click();
    }

    function drawShape(len, depth) {
        const s = len * 0.3;
        if (dna.type === 1) ctx.arc(0, -len/2, len/2, 0, Math.PI*2);
        else if (dna.type === 2) { ctx.moveTo(0, -len); ctx.lineTo(s, 0); ctx.lineTo(-s, 0); ctx.closePath(); }
        else if (dna.type === 3) ctx.rect(-s/2, -len, s, s);
        else if (dna.type === 4) {
            for(let i=0; i<6; i++) ctx.lineTo(s * Math.cos(i*Math.PI/3), -len + s * Math.sin(i*Math.PI/3));
            ctx.closePath();
        } else { ctx.moveTo(0, 0); ctx.lineTo(0, -len); }
    }

    function drawTree(x, y, len, angle, depth) {
        if (depth > Math.min(level + 1, 11)) return;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle * Math.PI / 180);
        ctx.beginPath();
        
        // 色のロジック：深くなるほどdna.colorを維持
        ctx.strokeStyle = (depth > level - 2) ? dna.leafColor : dna.color;
        ctx.lineWidth = Math.max(0.5, dna.thickness / (depth + 1));
        ctx.globalAlpha = 1 - (depth / 14);
        
        drawShape(len, depth);
        ctx.stroke();

        const s = Math.sin(time + depth) * dna.sway;
        drawTree(0, -len, len * dna.shrink, dna.angle + s, depth + 1);
        drawTree(0, -len, len * dna.shrink, -dna.angle + s, depth + 1);
        ctx.restore();
    }

    function render() {
        time = Date.now() * 0.002;
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, w, h);
        
        const baseLen = (h / 7) + (level * 6);
        const scale = Math.min(1, (h * 0.85) / (baseLen * 3));
        
        ctx.lineCap = 'round';
        drawTree(w/2, h - 80, baseLen * scale, dna.tilt, 0);
        requestAnimationFrame(render);
    }

    window.addEventListener('resize', init);
    init(); render(); updateUI();
</script>
</body>
</html>
