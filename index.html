<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Eternal Garden: Infinite Seeds</title>
    <style>
        :root { --accent: #00ffcc; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; overflow: hidden; font-family: 'Inter', sans-serif; touch-action: none; }
        canvas { display: block; filter: contrast(1.1) brightness(1.2) saturate(1.2); }

        /* UI復元 & 洗練 */
        .overlay-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; transition: 1.5s; text-align: center; padding: 0 40px; box-sizing: border-box; }
        .hidden { opacity: 0; visibility: hidden; pointer-events: none; transform: scale(1.05); }
        .logo-dot { width: 2px; height: 2px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 20px var(--accent); animation: pulse-dot 3s infinite; margin-bottom: 30px; }
        .slide-content h2 { font-size: 14px; letter-spacing: 12px; font-weight: 300; color: var(--accent); margin-bottom: 25px; text-transform: uppercase; }
        .slide-content p { font-size: 11px; line-height: 2.5; opacity: 0.7; font-weight: 300; margin: 0; letter-spacing: 0.1em; }
        .en-sub { display: block; font-size: 9px; opacity: 0.5; margin-top: 10px; letter-spacing: 0.05em; text-transform: uppercase; }

        .status-bar { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); padding: 15px 35px; border-radius: 40px; border: 0.5px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; min-width: 260px; z-index: 100; opacity: 0; transition: 1.5s; }
        #meta-info { font-size: 8px; letter-spacing: 2px; color: var(--accent); margin-bottom: 8px; font-weight: 600; }
        #title { font-size: 16px; letter-spacing: 8px; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; }
        .exp-container { width: 100%; height: 1.5px; background: rgba(255,255,255,0.1); position: relative; }
        #exp-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--accent); box-shadow: 0 0 15px var(--accent); transition: width 0.5s; }

        .side-controls { position: absolute; top: 55%; right: 25px; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 100; opacity: 0; transition: 1s; }
        .icon-btn { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.04); backdrop-filter: blur(15px); border: 0.5px solid rgba(255,255,255,0.12); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 18px; }

        #rebirth-btn { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); border: 1px solid var(--accent); color: var(--accent); padding: 16px 50px; border-radius: 40px; font-size: 11px; font-weight: 800; letter-spacing: 6px; display: none; z-index: 100; backdrop-filter: blur(10px); }

        @keyframes pulse-dot { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(5); opacity: 1; } }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.6; } }
    </style>
</head>
<body>

<div id="overlay" class="overlay-layer" onclick="showSlide(1)">
    <div class="logo-dot"></div>
    <div style="font-size:11px; letter-spacing:14px; font-weight:200;">ETERNAL GARDEN</div>
</div>

<div id="slide1" class="overlay-layer hidden" onclick="showSlide(2)">
    <div class="slide-content">
        <h2>Genesis / 起源</h2>
        <p>虚空に舞い降りた、一粒の光。<br>あなたの指先が、静寂を幾何学に変える。
        <span class="en-sub">A single drop of light in the void.<br>Your touch turns silence into geometry.</span></p>
    </div>
</div>

<div id="slide2" class="overlay-layer hidden" onclick="startGame()">
    <div class="slide-content">
        <h2>System / 共生</h2>
        <p>育ち、記録し、また昇華する。<br>二度と同じ形のない、一期一会の庭園へ。
        <span class="en-sub">Grow, record, and sublimate.<br>Step into a garden of once-in-a-lifetime forms.</span></p>
    </div>
</div>

<div id="status-ui" class="status-bar">
    <div id="meta-info">G.1 / S.1 (BUFF x1.0)</div>
    <div id="title">SEED</div>
    <div class="exp-container"><div id="exp-fill"></div></div>
</div>

<div id="side-ui" class="side-controls">
    <button class="icon-btn" onclick="flashEffect()">+</button>
    <button class="icon-btn" onclick="mutateDNA()">⬢</button>
    <button class="icon-btn" onclick="share()">↑</button>
    <button class="icon-btn" onclick="location.reload()">↺</button>
</div>

<button id="rebirth-btn" onclick="triggerRebirth()">SUBLIMATE / 昇華</button>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    const expFill = document.getElementById('exp-fill'), titleText = document.getElementById('title'), metaInfo = document.getElementById('meta-info');
    const rebirthBtn = document.getElementById('rebirth-btn'), statusUi = document.getElementById('status-ui'), sideUi = document.getElementById('side-ui');

    let w, h, time = 0, exp = 0, level = 1, rebirth = 0, dna = {}, gameStarted = false;
    const typeColors = ['#00ffcc', '#ff00ff', '#00ff88', '#ffff00', '#ff4d4d', '#4d79ff', '#ffffff'];
    const names = ["Seed", "Pulse", "Sprout", "Bloom", "Network", "Radiant", "Ancient", "Galaxy", "Void", "Eternal"];

    function generateDNA() {
        // 純粋なランダムではなく、互いに干渉し合う15以上のパラメータ
        dna = {
            angle: 10 + Math.random() * 65,
            shrink: 0.55 + Math.random() * 0.28,
            sway: 0.2 + Math.random() * 1.8,
            thickness: 1.0 + Math.random() * 2.5,
            color: typeColors[Math.floor(Math.random() * typeColors.length)],
            curvature: (Math.random() - 0.5) * 15, // 枝の曲がり率
            splitProb: Math.random(), // 分離の複雑さ
            asym: (Math.random() - 0.5) * 20, // 非対称性
            stepDiv: 1.5 + Math.random() * 1.5, // 成長テンポ
            leafType: Math.floor(Math.random() * 5), // 0:None, 1:Circle, 2:Hex, 3:Star, 4:Dust
            modFreq: 0.5 + Math.random() * 2 // 揺れの周期
        };
        document.documentElement.style.setProperty('--accent', dna.color);
    }

    function init() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; generateDNA(); }
    function showSlide(n) {
        document.querySelectorAll('.overlay-layer').forEach(el => el.classList.add('hidden'));
        if(n === 1) document.getElementById('slide1').classList.remove('hidden');
        if(n === 2) document.getElementById('slide2').classList.remove('hidden');
    }
    function startGame() { document.getElementById('slide2').classList.add('hidden'); gameStarted = true; setTimeout(() => { statusUi.style.opacity = sideUi.style.opacity = "1"; }, 500); }

    function mutateDNA() { generateDNA(); updateUI(); }
    function flashEffect() { ctx.fillStyle = dna.color; ctx.globalAlpha = 0.2; ctx.fillRect(0,0,w,h); ctx.globalAlpha = 1; }
    function share() { if(navigator.share) navigator.share({title:'Eternal Garden', url:location.href}); }

    window.addEventListener('touchstart', e => {
        if(!gameStarted || e.target.closest('button')) return;
        if(level < 20) {
            const buff = 1 + rebirth * 0.5;
            exp += (62 / Math.sqrt(level)) * buff;
            if(exp >= 100) { level++; exp = 0; updateUI(); }
            expFill.style.width = Math.min(100, exp) + '%';
        }
    });

    function updateUI() {
        metaInfo.innerText = `G.${rebirth + 1} / S.${level} (BUFF x${(1 + rebirth * 0.5).toFixed(1)})`;
        titleText.innerText = names[Math.min(9, Math.floor((level-1)/2))].toUpperCase();
        rebirthBtn.style.display = level >= 20 ? 'block' : 'none';
    }

    function triggerRebirth() { rebirth++; level = 1; exp = 0; generateDNA(); updateUI(); }

    function drawNode(len, depth, maxD) {
        if (depth < maxD * 0.7) return;
        const size = (maxD - depth) * 2;
        ctx.beginPath();
        if (dna.leafType === 1) ctx.arc(0, 0, size, 0, Math.PI*2);
        else if (dna.leafType === 2) { for(let i=0; i<6; i++) ctx.lineTo(Math.cos(i*Math.PI/3)*size, Math.sin(i*Math.PI/3)*size); }
        else if (dna.leafType === 4) { ctx.rect(-0.5, -0.5, 1, 1); ctx.globalAlpha *= 0.5; }
        ctx.fill();
    }

    function drawTree(len, angle, depth) {
        const maxDepth = Math.min(12, Math.floor(level / dna.stepDiv) + 1);
        if (depth > maxDepth) return;

        ctx.beginPath();
        ctx.lineWidth = Math.max(0.3, (dna.thickness * (1 - depth/maxDepth)) + (level/30));
        ctx.strokeStyle = dna.color;
        ctx.globalAlpha = Math.max(0.08, 1 - (depth / (maxDepth + 1)));

        if(level === 1 && depth === 0) {
            ctx.arc(0, 0, 1.8, 0, Math.PI*2); ctx.fill();
        } else {
            // 枝自体に「曲がり」を適用して有機的に
            ctx.moveTo(0,0);
            ctx.quadraticCurveTo(dna.curvature * depth, -len/2, 0, -len);
        }
        ctx.stroke();

        drawNode(len, depth, maxDepth);

        ctx.save();
        ctx.translate(0, -len);
        const sway = Math.sin(time * dna.modFreq + depth) * dna.sway;
        const nextLen = len * dna.shrink;

        // 分岐のランダム化
        const branchCount = (dna.splitProb > 0.85 && depth < 3) ? 3 : 2;
        const angles = branchCount === 3 ? [-angle, 0, angle] : [-angle, angle];

        angles.forEach((a, i) => {
            ctx.save();
            ctx.rotate((a + sway + (i === 0 ? -dna.asym : dna.asym)) * Math.PI / 180);
            drawTree(nextLen, angle, depth + 1);
            ctx.restore();
        });
        ctx.restore();
    }

    function render() {
        time = Date.now() * 0.0018;
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, w, h);
        if(gameStarted) {
            let baseLen = (level === 1) ? 2 : 10 + (level * 8);
            // 数学的な収まり調整（緻密になっても画面内に収める）
            const scale = (level < 3) ? 1 : Math.min(1.0, (h * 0.68) / (baseLen * 2.5));
            
            ctx.save();
            ctx.translate(w/2, h - 140);
            ctx.lineCap = 'round';
            drawTree(baseLen * scale, dna.angle, 0);
            ctx.restore();
        }
        requestAnimationFrame(render);
    }
    window.addEventListener('resize', init);
    init(); render(); updateUI();
</script>
</body>
</html>
