<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-browser-capable" content="yes">
    <meta name="apple-mobile-web-browser-status-bar-style" content="black-translucent">
    <title>Eternal Garden: Horizon</title>
    <style>
        :root { --accent: #00ffcc; }
        body { margin: 0; background: #000; color: #fff; overflow: hidden; font-family: 'Inter', sans-serif; touch-action: none; }
        canvas { display: block; }

        /* スタート画面 */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 1.2s;
        }
        #overlay.hidden { opacity: 0; visibility: hidden; }
        .logo-circle { width: 50px; height: 50px; border: 1px solid var(--accent); border-radius: 50%; margin-bottom: 20px; animation: pulse 4s infinite; }
        h0 { font-size: 16px; font-weight: 200; letter-spacing: 12px; color: var(--accent); }

        /* ゲームUIを画面上部へ移動 */
        #ui { 
            position: absolute; top: 60px; left: 0; width: 100%; 
            text-align: center; pointer-events: none; z-index: 100; 
            opacity: 0; transition: opacity 2s; 
        }
        #ui.visible { opacity: 1; }
        
        .top-panel {
            display: inline-block; background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 15px 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
            min-width: 280px; box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        .meta-info { font-size: 9px; letter-spacing: 2px; color: var(--accent); opacity: 0.8; margin-bottom: 5px; font-weight: bold; }
        #title { margin: 0 0 10px 0; font-size: 24px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; text-shadow: 0 0 15px var(--accent); }
        
        #exp-line { width: 100%; height: 2px; background: rgba(255,255,255,0.05); position: relative; margin-bottom: 8px; }
        #exp-fill { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 10px var(--accent); transition: width 0.3s; }
        
        .stats-footer { display: flex; justify-content: space-between; font-size: 8px; opacity: 0.4; letter-spacing: 1px; }

        #rebirth-btn { 
            position: absolute; bottom: -60px; left: 50%; transform: translateX(-50%);
            pointer-events: auto; background: none; color: var(--accent);
            border: 1px solid var(--accent); padding: 10px 25px; border-radius: 30px;
            font-size: 10px; font-weight: bold; letter-spacing: 2px; display: none; 
            box-shadow: 0 0 15px var(--accent); animation: blink 2s infinite;
        }

        /* 数値ポップアップ */
        .tap-val { position: fixed; color: var(--accent); font-weight: bold; pointer-events: none; animation: floatUp 0.8s forwards; font-size: 18px; z-index: 500; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-80px); opacity: 0; } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.2; } 50% { transform: scale(1.2); opacity: 0.5; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div id="overlay" onclick="startGame()">
    <div class="logo-circle"></div>
    <h0>ETERNAL GARDEN</h0>
</div>

<div id="ui">
    <div class="top-panel">
        <div id="meta" class="meta-info">GEN 1 / STAGE 1</div>
        <h1 id="title">SEED</h1>
        <div id="exp-line"><div id="exp-fill"></div></div>
        <div class="stats-footer">
            <span id="multiplier">x1.0 POWER</span>
            <span id="auto-tag">AUTO GROWING...</span>
        </div>
        <button id="rebirth-btn" onclick="triggerRebirth()">SUBMLIMATE</button>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    const expFill = document.getElementById('exp-fill'), metaText = document.getElementById('meta'), titleText = document.getElementById('title');
    const rebirthBtn = document.getElementById('rebirth-btn'), multDisplay = document.getElementById('multiplier');
    const overlay = document.getElementById('overlay'), ui = document.getElementById('ui');

    let w, h, time = 0, exp = 0, level = 1, rebirth = 0, gameStarted = false;
    let stars = [], particles = [], treeConfig = { angle: 22, shrink: 0.76, sway: 5 };

    const evolutionNames = ["Seed", "Sprout", "Sapling", "Bonsai", "Radiant", "Bloom", "Ancient", "Galaxy", "Void", "Eternal"];
    const typeColors = ['#00ffcc', '#ff00ff', '#00ff88', '#ffff00', '#ffffff', '#ff4d4d', '#4d79ff'];

    function init() {
        w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
        stars = Array.from({length: 80}, () => ({ x: Math.random()*w, y: Math.random()*h, s: Math.random()*1, v: Math.random()*0.3 }));
    }

    function startGame() { gameStarted = true; overlay.classList.add('hidden'); ui.classList.add('visible'); }

    window.addEventListener('touchstart', e => {
        if(!gameStarted || level >= 20) return;
        e.preventDefault();
        const mult = 1 + (rebirth * 0.8);
        const gain = (6 / Math.log2(level + 1)) * mult;
        grow(gain);
        const tapX = e.touches[0].clientX, tapY = e.touches[0].clientY;
        showTapValue(tapX, tapY, gain);
        for(let i=0; i<6; i++) {
            particles.push({x: tapX, y: tapY, a: Math.random()*Math.PI*2, s: Math.random()*5+2, l: 1});
        }
    });

    function showTapValue(x, y, val) {
        const el = document.createElement('div');
        el.className = 'tap-val';
        el.style.left = x + 'px'; el.style.top = y + 'px';
        el.innerText = '+' + val.toFixed(1);
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
    }

    setInterval(() => { if(gameStarted && level < 20) grow(0.3 * (1 + rebirth * 0.5)); }, 100);

    function grow(amount) {
        exp += amount;
        if(exp >= 100) { 
            if(level < 20) { 
                level++; exp = 0; 
                treeConfig.angle = 15 + Math.random() * 15;
                updateUI(); 
            }
        }
        expFill.style.width = Math.min(100, exp) + '%';
    }

    function updateUI() {
        metaText.innerText = `GENERATION ${rebirth + 1} / STAGE ${level}`;
        const nameIdx = Math.min(evolutionNames.length - 1, Math.floor((level-1)/2));
        titleText.innerText = evolutionNames[nameIdx];
        const color = typeColors[(rebirth + Math.floor(level/4)) % typeColors.length];
        document.documentElement.style.setProperty('--accent', color);
        multDisplay.innerText = `x${(1 + rebirth * 0.8).toFixed(1)} POWER`;
        if(level >= 20) rebirthBtn.style.display = 'block';
    }

    function triggerRebirth() {
        rebirth++; level = 1; exp = 0;
        rebirthBtn.style.display = 'none';
        treeConfig.sway = 3 + Math.random() * 7;
        updateUI();
    }

    function drawTree(x, y, len, angle, width, depth) {
        if (depth > level + 1) return;
        ctx.save();
        ctx.beginPath();
        const color = getComputedStyle(document.documentElement).getPropertyValue('--accent');
        ctx.strokeStyle = depth > (level-3) ? color : "#fff";
        ctx.lineWidth = width;
        ctx.globalAlpha = (Math.sin(time + depth)*0.1 + 0.9) * (1 - depth/24);
        ctx.translate(x, y); ctx.rotate(angle * Math.PI / 180);
        ctx.moveTo(0, 0); ctx.lineTo(0, -len); ctx.stroke();
        let branchAngle = treeConfig.angle + Math.sin(time + depth * 0.5) * treeConfig.sway;
        let shrink = 0.75 + (level * 0.002);
        drawTree(0, -len, len * shrink, branchAngle, width * 0.7, depth + 1);
        drawTree(0, -len, len * shrink, -branchAngle, width * 0.7, depth + 1);
        ctx.restore();
    }

    function render() {
        time = Date.now() * 0.0015;
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, w, h);
        stars.forEach(s => {
            s.y += s.v; if(s.y > h) s.y = 0;
            ctx.fillStyle = "#fff"; ctx.globalAlpha = (Math.sin(time + s.x)*0.5+0.5)*0.3;
            ctx.fillRect(s.x, s.y, s.s, s.s);
        });
        if(gameStarted) {
            particles.forEach((p, i) => {
                p.x += Math.cos(p.a)*p.s; p.y += Math.sin(p.a)*p.s; p.l -= 0.03;
                if(p.l <= 0) particles.splice(i, 1);
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent');
                ctx.globalAlpha = p.l; ctx.fillRect(p.x, p.y, 2, 2);
            });
            ctx.lineCap = 'round';
            // 樹を下部に配置。UIと被らないように！
            drawTree(w/2, h - 100, (h/22) + (level*8), 0, 11 - (level*0.4), 0);
        }
        requestAnimationFrame(render);
    }
    window.addEventListener('resize', init);
    init(); render(); updateUI();
</script>
</body>
</html>
