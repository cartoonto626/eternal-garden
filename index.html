<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-browser-capable" content="yes">
    <meta name="apple-mobile-web-browser-status-bar-style" content="black-translucent">
    <title>Eternal Garden: Refined</title>
    <style>
        :root { --accent: #00ffcc; }
        body { margin: 0; background: #000; color: #fff; overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; touch-action: none; }
        canvas { display: block; }
        
        #ui { position: absolute; bottom: 60px; left: 0; width: 100%; text-align: center; pointer-events: none; z-index: 100; }
        .glass {
            display: inline-block; background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 20px 30px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.1);
            min-width: 240px;
        }
        #rebirth-info { font-size: 10px; color: #ffcc00; letter-spacing: 3px; margin-bottom: 8px; font-weight: bold; }
        #status { font-size: 11px; letter-spacing: 2px; color: var(--accent); margin-bottom: 2px; opacity: 0.9; }
        #title { margin: 5px 0 15px 0; font-size: 24px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 15px var(--accent); }
        
        #exp-container { position: relative; width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 10px; }
        #exp-fill { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 15px var(--accent); transition: width 0.2s cubic-bezier(0.1, 0.5, 0.5, 1); border-radius: 10px; }
        #stats-row { display: flex; justify-content: space-between; font-size: 9px; opacity: 0.6; padding: 0 5px; }

        .btn-group { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }
        .btn {
            pointer-events: auto; background: rgba(255,255,255,0.08); color: #fff;
            border: 1px solid rgba(255,255,255,0.2); padding: 12px 24px; border-radius: 20px;
            font-size: 11px; font-weight: bold; transition: all 0.3s;
        }
        .btn:active { transform: scale(0.9); background: var(--accent); color: #000; border-color: transparent; }
        #rebirth-btn { display: none; background: var(--accent); color: #000; border: none; box-shadow: 0 0 20px var(--accent); }
    </style>
</head>
<body>

<div id="ui">
    <div class="glass">
        <div id="rebirth-info">GEN: 1</div>
        <div id="status">STAGE: 1</div>
        <h1 id="title">SEED</h1>
        
        <div id="exp-container">
            <div id="exp-fill"></div>
        </div>
        <div id="stats-row">
            <span id="multiplier">BUFF: x1.0</span>
            <span id="auto-tag">光合成中...</span>
        </div>

        <div class="btn-group">
            <button id="share-btn" class="btn" onclick="shareGarden()">SHARE</button>
            <button id="rebirth-btn" class="btn" onclick="triggerRebirth()">EVOLVE NEXT</button>
        </div>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    const expFill = document.getElementById('exp-fill'), statusText = document.getElementById('status'), titleText = document.getElementById('title');
    const rebirthBtn = document.getElementById('rebirth-btn'), rebirthDisplay = document.getElementById('rebirth-info'), multDisplay = document.getElementById('multiplier');

    let w, h, time = 0, exp = 0, level = 1, rebirth = 0;
    let stars = [], particles = [];

    const evolutionNames = ["SEED", "SPROUT", "SAPLING", "YOUNG TREE", "BUSH", "FLOWERING", "FRUITING", "GREAT TREE", "ANCIENT", "ETERNAL GARDEN"];
    const typeColors = ['#00ffcc', '#ff00ff', '#00ff88', '#ffff00', '#ffffff'];

    function init() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        stars = Array.from({length: 80}, () => ({ x: Math.random()*w, y: Math.random()*h, s: Math.random()*2, v: Math.random()*0.5 + 0.1 }));
    }

    window.addEventListener('touchstart', e => {
        e.preventDefault();
        if(level >= 20) return;
        
        // 転生によるインフレ倍率
        const multiplier = 1 + (rebirth * 0.8);
        const power = (3 / Math.log2(level + 1)) * multiplier;
        grow(power);
        
        for(let i=0; i<6; i++) {
            particles.push({x: e.touches[0].clientX, y: e.touches[0].clientY, a: Math.random()*Math.PI*2, s: Math.random()*4+1, l: 1});
        }
    });

    setInterval(() => {
        if(level < 20) {
            const autoPower = 0.3 * (1 + rebirth * 0.5);
            grow(autoPower);
        }
    }, 100);

    function grow(amount) {
        exp += amount;
        if(exp >= 100) {
            if(level < 20) {
                level++; exp = 0; updateUI();
            }
        }
        expFill.style.width = Math.min(100, exp) + '%';
    }

    function updateUI() {
        statusText.innerText = `STAGE: ${level}`;
        const nameIdx = Math.min(evolutionNames.length - 1, Math.floor((level-1)/2));
        titleText.innerText = evolutionNames[nameIdx];
        
        const color = typeColors[(rebirth + Math.floor(level/4)) % typeColors.length];
        document.documentElement.style.setProperty('--accent', color);
        multDisplay.innerText = `BUFF: x${(1 + rebirth * 0.8).toFixed(1)}`;
        
        if(level >= 20) rebirthBtn.style.display = 'inline-block';
    }

    function triggerRebirth() {
        rebirth++; level = 1; exp = 0;
        rebirthBtn.style.display = 'none';
        rebirthDisplay.innerText = `GEN: ${rebirth + 1}`;
        updateUI();
    }

    function drawTree(x, y, len, angle, width, depth) {
        if (depth > level + 1) return;
        ctx.save();
        ctx.beginPath();
        const color = getComputedStyle(document.documentElement).getPropertyValue('--accent');
        ctx.strokeStyle = depth > (level-2) ? color : "#fff";
        ctx.lineWidth = width;
        ctx.globalAlpha = (Math.sin(time + depth)*0.1 + 0.9) * (1 - depth/22);
        
        ctx.translate(x, y);
        ctx.rotate(angle * Math.PI / 180);
        ctx.moveTo(0, 0); ctx.lineTo(0, -len);
        ctx.stroke();

        let branchAngle = 18 + Math.sin(time + depth * 0.5) * 6;
        let shrink = 0.77;

        drawTree(0, -len, len * shrink, branchAngle, width * 0.7, depth + 1);
        drawTree(0, -len, len * shrink, -branchAngle, width * 0.7, depth + 1);
        ctx.restore();
    }

    function render() {
        time = Date.now() * 0.0015;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, w, h);

        // 星々がステージに合わせて輝きを増す
        stars.forEach(s => {
            s.y += s.v * (1 + rebirth * 0.2);
            if(s.y > h) s.y = 0;
            ctx.fillStyle = "#fff";
            ctx.globalAlpha = (Math.sin(time + s.x) * 0.5 + 0.5) * 0.8;
            ctx.fillRect(s.x, s.y, s.s, s.s);
        });

        particles.forEach((p, i) => {
            p.x += Math.cos(p.a) * p.s; p.y += Math.sin(p.a) * p.s; p.l -= 0.03;
            if(p.l <= 0) particles.splice(i, 1);
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent');
            ctx.globalAlpha = p.l;
            ctx.fillRect(p.x, p.y, 3, 3);
        });

        ctx.lineCap = 'round';
        drawTree(w/2, h - 120, (h/16) + (level*7), 0, 11 - (level*0.35), 0);
        requestAnimationFrame(render);
    }

    async function shareGarden() {
        const text = `【Eternal Garden】第${rebirth+1}世代。BUFF x${(1 + rebirth * 0.8).toFixed(1)} の力で、庭園はさらなる高みへ。`;
        if (navigator.share) await navigator.share({ title: 'Eternal Garden', text: text, url: window.location.href });
    }

    window.addEventListener('resize', init);
    init(); render(); updateUI();
</script>
</body>
</html>
