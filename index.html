<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-browser-capable" content="yes">
    <meta name="apple-mobile-web-browser-status-bar-style" content="black-translucent">
    <title>Eternal Garden: Genesis</title>
    <style>
        :root { --accent: #00ffcc; }
        body { margin: 0; background: #000; color: #fff; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; touch-action: none; }
        canvas { display: block; filter: contrast(1.2) brightness(1.2); }

        /* スタート画面：静寂と幻想 */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; /* 背景を静かな闇に */
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #overlay.hidden { opacity: 0; visibility: hidden; }
        
        .logo-container { position: relative; margin-bottom: 50px; }
        .logo-circle {
            width: 100px; height: 100px; border: 1px solid var(--accent);
            border-radius: 50%; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); animation: pulseLogos 4s infinite;
        }
        h0 { font-size: 24px; font-weight: 100; letter-spacing: 8px; margin: 0; color: var(--accent); text-shadow: 0 0 20px var(--accent); text-transform: uppercase; }
        .start-hint { font-size: 10px; letter-spacing: 4px; opacity: 0.5; margin-top: 20px; animation: blink 2s infinite; color: #fff; text-transform: uppercase; }

        /* ゲームUI */
        #ui { position: absolute; top: 50px; left: 0; width: 100%; text-align: center; pointer-events: none; z-index: 100; opacity: 0; transition: opacity 1s; }
        #ui.visible { opacity: 1; }
        
        .header {
            display: inline-block; background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 10px 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            min-width: 260px;
        }
        #meta { font-size: 8px; letter-spacing: 2px; color: var(--accent); opacity: 0.8; margin-bottom: 4px; }
        #title { margin: 0 0 8px 0; font-size: 20px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        #exp-line { width: 100%; height: 2px; background: rgba(255,255,255,0.1); position: relative; }
        #exp-fill { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 10px var(--accent); transition: width 0.3s cubic-bezier(0.1, 0.5, 0.5, 1); }

        #rebirth-btn { 
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            pointer-events: auto; background: var(--accent); color: #000;
            border: none; padding: 12px 30px; border-radius: 25px;
            font-size: 11px; font-weight: bold; letter-spacing: 2px; display: none; 
            box-shadow: 0 0 20px var(--accent); z-index: 200;
        }

        .tap-val { position: fixed; color: var(--accent); font-weight: 900; pointer-events: none; animation: floatUp 0.6s ease-out forwards; font-size: 20px; z-index: 500; text-shadow: 0 0 10px rgba(0,0,0,0.8); }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-60px) scale(1.2); opacity: 0; } }
        @keyframes pulseLogos { 0%, 100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.3; } 50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.6; } }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.7; } }
    </style>
</head>
<body>

<div id="overlay" onclick="startGame()">
    <div class="logo-container">
        <div class="logo-circle"></div>
        <h0>Eternal Garden</h0>
    </div>
    <div class="start-hint">TAP TO ENTER</div>
</div>

<div id="ui">
    <div class="header">
        <div id="meta">GENERATION 1 / STAGE 1</div>
        <h1 id="title">SEED</h1>
        <div id="exp-line"><div id="exp-fill"></div></div>
    </div>
</div>

<button id="rebirth-btn" onclick="triggerRebirth()">SUBMLIMATE</button>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    const expFill = document.getElementById('exp-fill'), metaText = document.getElementById('meta'), titleText = document.getElementById('title');
    const rebirthBtn = document.getElementById('rebirth-btn'), overlay = document.getElementById('overlay'), ui = document.getElementById('ui');

    let w, h, time = 0, exp = 0, level = 1, rebirth = 0, gameStarted = false;
    let stars = [], particles = [], dna = { angle: 22, shrink: 0.76, sway: 4, width: 10, type: 0 }; // type: 0:線, 1:丸, 2:三角, 3:四角, 4:六角

    const evolutionNames = ["Seed", "Sprout", "Sapling", "Bonsai", "Radiant", "Bloom", "Ancient", "Galaxy", "Void", "Eternal"];
    const typeColors = ['#00ffcc', '#ff00ff', '#00ff88', '#ffff00', '#ffffff', '#ff4d4d', '#4d79ff'];

    function init() {
        w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
        // 背景の図形を削除し、静かな闇に
        stars = Array.from({length: 60}, () => ({ x: Math.random()*w, y: Math.random()*h, s: Math.random()*1, v: Math.random()*0.2 }));
    }

    function startGame() { gameStarted = true; overlay.classList.add('hidden'); ui.classList.add('visible'); }

    window.addEventListener('touchstart', e => {
        if(!gameStarted || level >= 20) return;
        e.preventDefault();
        const mult = 1 + (rebirth * 1.5); // 倍率を強化
        const gain = (8 / Math.log2(level + 1.5)) * mult;
        grow(gain);
        const t = e.touches[0];
        showTapValue(t.clientX, t.clientY, gain);
        for(let i=0; i<5; i++) particles.push({x: t.clientX, y: t.clientY, a: Math.random()*Math.PI*2, s: Math.random()*4+2, l: 1});
    });

    function showTapValue(x, y, val) {
        const el = document.createElement('div');
        el.className = 'tap-val'; el.style.left = x + 'px'; el.style.top = y + 'px';
        el.innerText = '+' + val.toFixed(0);
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 600);
    }

    setInterval(() => { if(gameStarted && level < 20) grow(0.4 * (1 + rebirth * 0.7)); }, 100);

    function grow(amount) {
        exp += amount;
        if(exp >= 100) { if(level < 20) { level++; exp = 0; updateUI(); } }
        expFill.style.width = Math.min(100, exp) + '%';
    }

    function updateUI() {
        metaText.innerText = `GENERATION ${rebirth + 1} / STAGE ${level} (POWER x${(1 + rebirth * 1.5).toFixed(1)})`;
        titleText.innerText = evolutionNames[Math.min(9, Math.floor((level-1)/2))];
        const color = typeColors[(rebirth) % typeColors.length];
        document.documentElement.style.setProperty('--accent', color);
        if(level >= 20) rebirthBtn.style.display = 'block';
    }

    function triggerRebirth() {
        rebirth++; level = 1; exp = 0;
        rebirthBtn.style.display = 'none';
        // 転生時にDNAをランダム化 (バリエーション強化)
        dna.angle = 15 + Math.random() * 25;
        dna.sway = 2 + Math.random() * 8;
        dna.shrink = 0.72 + Math.random() * 0.08;
        dna.type = Math.floor(Math.random() * 5); // 0:線, 1:丸, 2:三角, 3:四角, 4:六角
        updateUI();
    }

    // 幾何学図形を描画する関数
    function drawShape(ctx, depth, width, len) {
        if (dna.type === 0) {
            // 線 (従来通り)
            ctx.moveTo(0, 0); ctx.lineTo(0, -len);
        } else if (dna.type === 1) {
            // 丸 (曲線)
            ctx.arc(0, -len/2, len/2, Math.PI/2, Math.PI*1.5);
        } else if (dna.type === 2) {
            // 三角形 (正三角形)
            ctx.moveTo(0, -len);
            ctx.lineTo(len/2, 0);
            ctx.lineTo(-len/2, 0);
            ctx.closePath();
        } else if (dna.type === 3) {
            // 四角形 (正方形)
            ctx.rect(-len/2, -len, len, len);
        } else if (dna.type === 4) {
            // 六角形 (正六角形)
            ctx.moveTo(0, -len);
            for(let i=0; i<6; i++) {
                ctx.lineTo(len * Math.cos(i*Math.PI/3), -len * Math.sin(i*Math.PI/3));
            }
            ctx.closePath();
        }
    }

    // 軽量化された幾何学描画ロジック
    function drawTree(x, y, len, angle, width, depth) {
        // 深さを制限して軽量化 (最大11段階に)
        if (depth > Math.min(level + 1, 11)) return;
        
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle * Math.PI / 180);
        
        ctx.beginPath();
        const color = getComputedStyle(document.documentElement).getPropertyValue('--accent');
        ctx.strokeStyle = (depth > level - 2) ? color : "#fff";
        ctx.lineWidth = width;
        ctx.globalAlpha = (1 - depth/14);
        
        // 図形を描画
        drawShape(ctx, depth, width, len);
        ctx.stroke();

        let s = dna.sway + Math.sin(time + depth) * 2;
        // 枝分かれの角度をレベルに応じて調整
        drawTree(0, -len, len * dna.shrink, dna.angle + s, width * 0.72, depth + 1);
        drawTree(0, -len, len * dna.shrink, -dna.angle - s, width * 0.72, depth + 1);
        ctx.restore();
    }

    function render() {
        time = Date.now() * 0.0015;
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, w, h);
        
        // 静かな闇に浮かび上がる樹木を描画
        stars.forEach(s => {
            ctx.fillStyle = "#fff"; ctx.globalAlpha = 0.3;
            ctx.fillRect(s.x, s.y, s.s, s.s);
        });

        if(gameStarted) {
            particles.forEach((p, i) => {
                p.x += Math.cos(p.a)*p.s; p.y += Math.sin(p.a)*p.s; p.l -= 0.04;
                if(p.l <= 0) particles.splice(i, 1);
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent');
                ctx.globalAlpha = p.l; ctx.fillRect(p.x, p.y, 2, 2);
            });
            ctx.lineCap = 'round';
            // 樹の位置を調整
            drawTree(w/2, h - 80, (h/20) + (level*7), 0, 12 - (level*0.4), 0);
        }
        requestAnimationFrame(render);
    }
    window.addEventListener('resize', init);
    init(); render(); updateUI();
</script>
</body>
</html>
