<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Eternal Garden: Gallery Edition</title>
    <style>
        :root { --accent: #00ffcc; }
        body { margin: 0; background: #000; color: #fff; overflow: hidden; font-family: -apple-system, sans-serif; touch-action: none; }
        canvas { display: block; filter: contrast(1.1) brightness(1.2) saturate(1.2); }

        /* スタート画面 */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; transition: opacity 1.2s;
        }
        #overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .logo-circle { width: 80px; height: 80px; border: 1px solid var(--accent); border-radius: 50%; animation: pulse 4s infinite; }

        /* メインUI */
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; opacity: 0; transition: opacity 1s; }
        #ui.visible { opacity: 1; }
        .interactive { pointer-events: auto; }

        .header {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 15px 25px; border-radius: 20px; border: 0.5px solid rgba(255,255,255,0.1);
            text-align: center; min-width: 240px;
        }
        #meta-info { font-size: 9px; letter-spacing: 2px; color: var(--accent); margin-bottom: 5px; opacity: 0.8; }
        #title { margin: 0; font-size: 18px; letter-spacing: 4px; text-transform: uppercase; font-weight: 800; }
        #exp-bar { width: 100%; height: 2px; background: rgba(255,255,255,0.1); margin-top: 10px; }
        #exp-fill { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 12px var(--accent); transition: width 0.3s; }

        /* 操作ボタン */
        .controls { position: absolute; bottom: 40px; right: 20px; display: flex; flex-direction: column; gap: 15px; }
        .icon-btn { 
            width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-size: 20px; 
            display: flex; align-items: center; justify-content: center;
        }
        #add-btn { background: var(--accent); color: #000; font-weight: bold; border: none; }

        /* コレクションページ（オーバーレイ） */
        #gallery-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            z-index: 1500; display: none; flex-direction: column; align-items: center; padding: 80px 20px;
        }
        #gallery-page.open { display: flex; }
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; max-height: 70vh; overflow-y: auto; }
        .gallery-item { aspect-ratio: 1; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); background-size: cover; background-position: center; }
        .close-gallery { margin-top: 30px; padding: 10px 30px; border-radius: 20px; border: 1px solid #fff; background: none; color: #fff; font-size: 12px; letter-spacing: 2px; }

        #rebirth-btn { 
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #000; border: none; padding: 12px 35px; border-radius: 25px;
            font-size: 11px; font-weight: 900; letter-spacing: 2px; display: none; box-shadow: 0 0 20px var(--accent);
        }

        @keyframes pulse { 0%, 100% { transform: scale(0.9); opacity: 0.3; } 50% { transform: scale(1.1); opacity: 0.8; } }
    </style>
</head>
<body>

<div id="overlay" onclick="startGame()">
    <div class="logo-circle"></div>
    <h0 style="margin-top:20px; letter-spacing:8px; font-weight:100;">Eternal Garden</h0>
    <div style="font-size:9px; opacity:0.4; margin-top:40px; letter-spacing:4px;">TAP TO AWAKEN</div>
</div>

<div id="ui">
    <div class="header">
        <div id="meta-info">GEN 1 / STAGE 1 (BUFF x1.0)</div>
        <div id="title">SEED</div>
        <div id="exp-bar"><div id="exp-fill"></div></div>
    </div>

    <div class="controls">
        <button class="icon-btn interactive" onclick="shareCanvas()">↑</button>
        <button id="add-btn" class="icon-btn interactive" onclick="addToCollection()">+</button>
        <button class="icon-btn interactive" onclick="toggleGallery()">𖡼</button>
    </div>

    <button id="rebirth-btn" class="interactive" onclick="triggerRebirth()">SUBLIMATE</button>
</div>

<div id="gallery-page" class="interactive">
    <h2 style="letter-spacing:10px; font-weight:100; margin-bottom:40px;">ARCHIVE</h2>
    <div class="gallery-grid" id="gallery-grid"></div>
    <button class="close-gallery" onclick="toggleGallery()">CLOSE</button>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    const expFill = document.getElementById('exp-fill'), titleText = document.getElementById('title'), metaInfo = document.getElementById('meta-info');
    const rebirthBtn = document.getElementById('rebirth-btn'), overlay = document.getElementById('overlay'), ui = document.getElementById('ui');
    const galleryPage = document.getElementById('gallery-page'), galleryGrid = document.getElementById('gallery-grid');

    let w, h, time = 0, exp = 0, level = 1, rebirth = 0, dna = {}, gameStarted = false;
    const evolutionNames = ["Seed", "Sprout", "Sapling", "Bonsai", "Radiant", "Bloom", "Ancient", "Galaxy", "Void", "Eternal"];
    const typeColors = ['#00ffcc', '#ff00ff', '#00ff88', '#ffff00', '#ff4d4d', '#4d79ff', '#ffffff'];

    function generateUniqueDNA() {
        const seed = Date.now() + Math.random();
        const colorBase = typeColors[Math.floor(Math.random() * typeColors.length)];
        dna = {
            angle: 15 + (Math.sin(seed) * 0.5 + 0.5) * 55,
            shrink: 0.68 + (Math.cos(seed) * 0.5 + 0.5) * 0.12,
            sway: 1.5 + Math.random() * 4,
            type: Math.floor(Math.random() * 5),
            color: colorBase,
            leafColor: Math.random() > 0.4 ? '#fff' : colorBase,
            thickness: 4 + Math.random() * 6,
            tilt: (Math.random() - 0.5) * 20
        };
        document.documentElement.style.setProperty('--accent', dna.color);
    }

    function init() {
        w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
        generateUniqueDNA();
    }

    function startGame() { gameStarted = true; overlay.classList.add('hidden'); ui.classList.add('visible'); }

    window.addEventListener('touchstart', e => {
        if(!gameStarted || galleryPage.classList.contains('open')) return;
        if(level < 20) {
            exp += (18 / Math.log2(level + 2)) * (1 + rebirth * 0.5);
            if(exp >= 100) { level++; exp = 0; updateUI(); }
            expFill.style.width = Math.min(100, exp) + '%';
        }
    });

    function updateUI() {
        const power = (1 + rebirth * 0.5).toFixed(1);
        metaInfo.innerText = `GEN ${rebirth + 1} / STAGE ${level} (BUFF x${power})`;
        titleText.innerText = evolutionNames[Math.min(9, Math.floor((level-1)/2))];
        if(level >= 20) rebirthBtn.style.display = 'block';
    }

    function triggerRebirth() {
        rebirth++; level = 1; exp = 0;
        rebirthBtn.style.display = 'none';
        generateUniqueDNA(); updateUI();
    }

    function toggleGallery() { galleryPage.classList.toggle('open'); }

    function addToCollection() {
        const dataUrl = canvas.toDataURL('image/png', 0.2);
        const item = document.createElement('div');
        item.className = 'gallery-item';
        item.style.backgroundImage = `url(${dataUrl})`;
        const currentDNA = JSON.parse(JSON.stringify(dna));
        item.onclick = () => { 
            dna = currentDNA; 
            document.documentElement.style.setProperty('--accent', dna.color);
            toggleGallery();
        };
        galleryGrid.appendChild(item);
        // 保存時にちょっとした視覚フィードバック
        const btn = document.getElementById('add-btn');
        btn.style.transform = 'scale(1.2)';
        setTimeout(() => btn.style.transform = 'scale(1)', 200);
    }

    function shareCanvas() {
        const dataUrl = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.download = `EternalGarden_${Date.now()}.png`;
        link.href = dataUrl; link.click();
    }

    function drawShape(len) {
        const s = len * 0.3;
        if (dna.type === 1) ctx.arc(0, -len/2, len/2, 0, Math.PI*2);
        else if (dna.type === 2) { ctx.moveTo(0, -len); ctx.lineTo(s, 0); ctx.lineTo(-s, 0); ctx.closePath(); }
        else if (dna.type === 3) ctx.rect(-s/2, -len, s, s);
        else if (dna.type === 4) {
            for(let i=0; i<6; i++) ctx.lineTo(s * Math.cos(i*Math.PI/3), -len + s * Math.sin(i*Math.PI/3));
            ctx.closePath();
        } else { ctx.moveTo(0, 0); ctx.lineTo(0, -len); }
    }

    function drawTree(x, y, len, angle, depth) {
        if (depth > Math.min(level + 1, 11)) return;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle * Math.PI / 180);
        ctx.beginPath();
        ctx.strokeStyle = (depth > level - 2) ? dna.leafColor : dna.color;
        ctx.lineWidth = Math.max(0.8, dna.thickness / (depth + 1));
        ctx.globalAlpha = 1 - (depth / 14);
        drawShape(len);
        ctx.stroke();
        const s = Math.sin(time + depth) * dna.sway;
        drawTree(0, -len, len * dna.shrink, dna.angle + s, depth + 1);
        drawTree(0, -len, len * dna.shrink, -dna.angle + s, depth + 1);
        ctx.restore();
    }

    function render() {
        time = Date.now() * 0.002;
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, w, h);
        if(gameStarted) {
            const baseLen = (h / 7) + (level * 6);
            const scale = Math.min(1, (h * 0.85) / (baseLen * 3.2));
            ctx.lineCap = 'round';
            drawTree(w/2, h - 100, baseLen * scale, dna.tilt, 0);
        }
        requestAnimationFrame(render);
    }

    window.addEventListener('resize', init);
    init(); render(); updateUI();
</script>
</body>
</html>
