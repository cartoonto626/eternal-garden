<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Eternal Garden</title>

    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { --neon-color: #00ff7f; }
        body { margin: 0; background: #000; color: var(--neon-color); font-family: 'serif'; overflow: hidden; touch-action: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; }

        /* スタート画面 */
        #start-screen {
            position: fixed; width: 100%; height: 100%; background: #000; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 2s;
        }

        h1 { font-size: 2.2rem; letter-spacing: 0.5em; text-shadow: 0 0 20px var(--neon-color); margin-bottom: 40px; }
        
        .enter-btn { 
            background: none; border: 1px solid var(--neon-color); color: var(--neon-color);
            padding: 15px 50px; font-size: 1.1rem; cursor: pointer; transition: 0.5s;
        }
        .enter-btn:hover { background: rgba(0, 255, 127, 0.2); box-shadow: 0 0 20px var(--neon-color); }

        /* ENTER後の二言語メッセージ */
        #intro-message {
            position: fixed; width: 100%; text-align: center; z-index: 90;
            pointer-events: none; opacity: 0; transition: opacity 2s;
        }
        .jp { font-size: 1.2rem; display: block; margin-bottom: 5px; }
        .en { font-size: 0.7rem; opacity: 0.7; letter-spacing: 0.2em; display: block; }

        /* UIパネル */
        .ui-panel { position: absolute; z-index: 10; opacity: 0; transition: opacity 2s; }
        button.ui-btn {
            background: rgba(0,0,0,0.5); border: 1px solid var(--neon-color); color: var(--neon-color);
            width: 45px; height: 45px; border-radius: 50%; font-size: 1.2rem; margin: 10px;
        }

        #archive-panel {
            position: fixed; left: -300px; top: 0; width: 260px; height: 100%;
            background: rgba(0, 10, 5, 0.95); border-right: 1px solid var(--neon-color);
            transition: 0.5s; z-index: 110; padding: 20px; overflow-y: auto;
        }
        #archive-panel.open { left: 0; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>ETERNAL GARDEN</h1>
        <button class="enter-btn" onclick="beginExperience()">ENTER</button>
    </div>

    <div id="intro-message">
        <span class="jp">聖なる庭園へようこそ</span>
        <span class="en">WELCOME TO THE SACRED GROVE</span>
        <br>
        <span class="jp">画面に触れ、命を育んでください</span>
        <span class="en">TOUCH TO NURTURE THE DIGITAL LIFE</span>
    </div>

    <div id="ui-elements" class="ui-panel" style="width:100%;">
        <div style="float:left; margin:20px;"><button class="ui-btn" onclick="toggleArchive()">≡</button></div>
        <div style="float:right; margin:20px;">
            <button class="ui-btn" onclick="saveSpecimen()">＋</button>
            <button class="ui-btn" onclick="resetGarden()">↺</button>
        </div>
    </div>

    <div id="archive-panel">
        <h3>ARCHIVE</h3>
        <div id="archive-list"></div>
        <br><button class="enter-btn" style="padding:5px 15px;" onclick="toggleArchive()">CLOSE</button>
    </div>

    <canvas id="gardenCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gardenCanvas');
        const ctx = canvas.getContext('2d');
        let level = 1;
        let specimens = JSON.parse(localStorage.getItem('garden_archive') || '[]');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawGarden();
        }
        window.addEventListener('resize', resize);
        resize();

        // 演出開始
        function beginExperience() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                const intro = document.getElementById('intro-message');
                intro.style.opacity = '1';
                
                // 数秒後にメッセージを消してUIを出す
                setTimeout(() => {
                    intro.style.opacity = '0';
                    document.getElementById('ui-elements').style.opacity = '1';
                }, 4000);
            }, 2000);
        }

        // --- 樹の描画（成長・フラクタル機能） ---
        function drawTree(x, y, len, angle, width) {
            ctx.beginPath();
            ctx.save();
            ctx.strokeStyle = '#00ff7f';
            ctx.lineWidth = width;
            ctx.translate(x, y);
            ctx.rotate(angle * Math.PI / 180);
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -len);
            ctx.stroke();

            if (len < 5) { ctx.restore(); return; }

            drawTree(0, -len, len * 0.8, angle + 25, width * 0.7);
            drawTree(0, -len, len * 0.8, angle - 25, width * 0.7);
            ctx.restore();
        }

        function drawGarden() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawTree(canvas.width / 2, canvas.height * 0.9, level * 8, 0, 2);
        }

        canvas.addEventListener('touchstart', (e) => {
            level++;
            drawGarden();
        });

        // --- 標本（アーカイブ）機能 ---
        function saveSpecimen() {
            const name = prompt("標本名を入力してください / Enter specimen name");
            if (name) {
                specimens.push({ name, level });
                localStorage.setItem('garden_archive', JSON.stringify(specimens));
            }
        }

        function toggleArchive() {
            const p = document.getElementById('archive-panel');
            p.classList.toggle('open');
            if(p.classList.contains('open')) updateArchiveList();
        }

        function updateArchiveList() {
            const list = document.getElementById('archive-list');
            list.innerHTML = '';
            specimens.forEach((s, i) => {
                const item = document.createElement('div');
                item.style.padding = "10px";
                item.style.borderBottom = "1px solid #00ff7f44";
                item.innerText = `${s.name} (Lv.${s.level})`;
                item.onclick = () => { level = s.level; drawGarden(); toggleArchive(); };
                list.appendChild(item);
            });
        }

        function resetGarden() { level = 1; drawGarden(); }

        drawGarden();
    </script>
</body>
</html>
