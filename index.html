<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Eternal Garden: Infinite Diversity</title>
    <style>
        :root { --accent: #00ffcc; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; overflow: hidden; font-family: 'Inter', sans-serif; touch-action: none; }
        canvas { display: block; filter: contrast(1.1) brightness(1.2); }

        .status-bar { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); padding: 12px 30px; border-radius: 40px; border: 0.5px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; min-width: 240px; z-index: 100; opacity: 0; transition: 1s; }
        #meta-info { font-size: 8px; letter-spacing: 2px; color: var(--accent); margin-bottom: 5px; font-weight: 600; text-transform: uppercase; }
        #title { font-size: 13px; letter-spacing: 6px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; }
        .exp-container { width: 100%; height: 1px; background: rgba(255,255,255,0.1); position: relative; }
        #exp-fill { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 12px var(--accent); transition: width 0.3s; }

        .side-controls { position: absolute; top: 50%; right: 20px; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 100; opacity: 0; transition: 1s; }
        .icon-btn { width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 0.5px solid rgba(255,255,255,0.1); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 18px; }

        #rebirth-btn { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); background: none; border: 1px solid var(--accent); color: var(--accent); padding: 14px 45px; border-radius: 35px; font-size: 10px; font-weight: 800; letter-spacing: 5px; display: none; z-index: 100; backdrop-filter: blur(5px); }

        .overlay-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; transition: 1s; text-align: center; padding: 0 40px; box-sizing: border-box; }
        .hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    </style>
</head>
<body>

<div id="overlay" class="overlay-layer" onclick="showSlide(1)">
    <div style="width:2px; height:2px; background:var(--accent); box-shadow:0 0 15px var(--accent); margin-bottom:30px;"></div>
    <div style="font-size:10px; letter-spacing:12px;">ETERNAL GARDEN</div>
</div>

<div id="slide1" class="overlay-layer hidden" onclick="startGame()">
    <div style="font-size:13px; letter-spacing:10px; color:var(--accent); margin-bottom:25px;">DIVERSITY</div>
    <p style="font-size:11px; line-height:2.2; opacity:0.6;">同じ形は、二度と現れない。<br>一粒の光から始まる、無限の分岐へ。</p>
</div>

<div id="status-ui" class="status-bar">
    <div id="meta-info">G.1 / S.1 (BUFF x1.0)</div>
    <div id="title">SEED</div>
    <div class="exp-container"><div id="exp-fill"></div></div>
</div>

<div id="side-ui" class="side-controls">
    <button class="icon-btn" onclick="location.reload()">↺</button>
</div>

<button id="rebirth-btn" onclick="triggerRebirth()">SUBLIMATE / 昇華</button>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    const expFill = document.getElementById('exp-fill'), titleText = document.getElementById('title'), metaInfo = document.getElementById('meta-info');
    const rebirthBtn = document.getElementById('rebirth-btn'), statusUi = document.getElementById('status-ui'), sideUi = document.getElementById('side-ui');

    let w, h, time = 0, exp = 0, level = 1, rebirth = 0, dna = {}, gameStarted = false;
    const typeColors = ['#00ffcc', '#ff00ff', '#00ff88', '#ffff00', '#ff4d4d', '#4d79ff', '#ffffff'];
    const names = ["Seed", "Pulse", "Sprout", "Bloom", "Network", "Radiant", "Ancient", "Galaxy", "Void", "Eternal"];

    function generateDNA() {
        const s = Math.random();
        dna = {
            angle: 15 + Math.random() * 50,
            shrink: 0.68 + Math.random() * 0.12,
            sway: 0.4 + Math.random() * 1.6,
            thickness: 1.2 + Math.random() * 2.5,
            color: typeColors[Math.floor(Math.random() * typeColors.length)],
            // 多様性のための新パラメータ
            branchType: Math.floor(Math.random() * 4), // 0:直線 1:曲線 2:円 3:多角形
            asymmetry: (Math.random() - 0.5) * 10, // 左右非対称性
            splitCount: Math.random() > 0.8 ? 3 : 2 // たまに3分岐する
        };
        document.documentElement.style.setProperty('--accent', dna.color);
    }

    function init() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; generateDNA(); }
    function showSlide(n) {
        document.getElementById('overlay').classList.add('hidden');
        document.getElementById('slide1').classList.remove('hidden');
    }
    function startGame() { 
        document.getElementById('slide1').classList.add('hidden'); 
        gameStarted = true; 
        setTimeout(() => { statusUi.style.opacity = sideUi.style.opacity = "1"; }, 500); 
    }

    window.addEventListener('touchstart', e => {
        if(!gameStarted || e.target.closest('button')) return;
        if(level < 20) {
            const buff = 1 + rebirth * 0.5;
            exp += (55 / Math.sqrt(level)) * buff;
            if(exp >= 100) { level++; exp = 0; updateUI(); }
            expFill.style.width = Math.min(100, exp) + '%';
        }
    });

    function updateUI() {
        metaInfo.innerText = `G.${rebirth + 1} / S.${level} (BUFF x${(1 + rebirth * 0.5).toFixed(1)})`;
        titleText.innerText = names[Math.min(9, Math.floor((level-1)/2))].toUpperCase();
        rebirthBtn.style.display = level >= 20 ? 'block' : 'none';
    }

    function triggerRebirth() { rebirth++; level = 1; exp = 0; generateDNA(); updateUI(); }

    // 多様なパーツを描画
    function drawPart(len, depth) {
        const s = len * 0.3;
        if (dna.branchType === 1) { // 曲線
            ctx.quadraticCurveTo(s, -len/2, 0, -len);
        } else if (dna.branchType === 2) { // 円
            ctx.arc(0, -len/2, len/3, 0, Math.PI * 2);
        } else if (dna.branchType === 3) { // 多角形/結晶
            ctx.moveTo(0, 0); ctx.lineTo(s, -len/2); ctx.lineTo(0, -len); ctx.lineTo(-s, -len/2); ctx.closePath();
        } else { // 直線
            ctx.moveTo(0, 0); ctx.lineTo(0, -len);
        }
    }

    function drawTree(len, angle, depth) {
        const maxDepth = Math.min(10, Math.floor(level / 1.8) + 2);
        if (depth > maxDepth) return;

        ctx.beginPath();
        ctx.lineWidth = Math.max(0.4, (dna.thickness * (1 - depth/maxDepth)) + (level/15));
        ctx.strokeStyle = dna.color;
        ctx.globalAlpha = Math.max(0.1, 1 - (depth / (maxDepth + 1)));

        if(level === 1 && depth === 0) {
            ctx.arc(0, 0, 1.5, 0, Math.PI*2); ctx.fill();
        } else {
            drawPart(len, depth); // 形状を変更
        }
        ctx.stroke();

        ctx.save();
        ctx.translate(0, -len);
        
        const sway = Math.sin(time + depth) * dna.sway;
        const nextLen = len * dna.shrink;

        // 分岐処理（多様性）
        const angles = dna.splitCount === 3 ? [-angle, 0, angle] : [-angle, angle];
        angles.forEach((a, i) => {
            ctx.save();
            // 左右非対称を適用
            ctx.rotate((a + sway + (i === 0 ? -dna.asymmetry : dna.asymmetry)) * Math.PI / 180);
            drawTree(nextLen, angle, depth + 1);
            ctx.restore();
        });
        
        ctx.restore();
    }

    function render() {
        time = Date.now() * 0.0015;
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, w, h);
        if(gameStarted) {
            const baseLen = (level === 1) ? 2 : 12 + (level * 8);
            const autoScale = (level === 1) ? 1 : Math.min(1.1, (h * 0.7) / (baseLen * 2.8));
            ctx.save();
            ctx.translate(w/2, h - 120);
            drawTree(baseLen * autoScale, dna.angle, 0);
            ctx.restore();
        }
        requestAnimationFrame(render);
    }
    window.addEventListener('resize', init);
    init(); render(); updateUI();
</script>
</body>
</html>
